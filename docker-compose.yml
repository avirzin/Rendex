version: '3.8'

services:
  oracle-service:
    build:
      context: ./oracle-service
      dockerfile: Dockerfile
    environment:
      - RPC_URL=${RPC_URL}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - CDI_ORACLE_ADDRESS=${CDI_ORACLE_ADDRESS}
    restart: unless-stopped
    networks:
      - rendex-network

networks:
  rendex-network:
    driver: bridge 